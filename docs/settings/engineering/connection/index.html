<script>
  (function() {
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const el = document.getElementById('top-clock');
      if (el) el.textContent = h + ':' + m;
    }
    setInterval(updateClock, 1000);
    updateClock();

    document.getElementById('btn-shutdown-top')?.addEventListener('click', function() {
      // Shutdown flow per designs/02-shutdown-progress.html → 02-shutdown-complete.html.
      // STEP1: progress modal (blocking, no buttons) → STEP2: complete modal.
      if (!window.IRModal) return;
      window.IRModal.confirm({
        title: '알림',
        body: '장비를 종료하시겠습니까?',
        onOk: function () {
          // STEP1: progress (blocking 2.5s)
          window.IRModal.info({
            body: '⏳<br>장비를 종료합니다.<br>기다려 주세요',
            buttons: []
          });
          setTimeout(function () {
            // STEP2: complete (no buttons, waiting for physical power off)
            window.IRModal.info({
              body: '장비 종료 완료<br>전원 스위치를 꺼<br>주세요.',
              buttons: []
            });
          }, 2500);
        }
      });
    });

    // Simple language toggle simulation
    document.querySelector('.tb-lang-wrap')?.addEventListener('click', function() {
       const lang = this.querySelector('span').textContent;
       this.querySelector('span').textContent = (lang === 'KO' ? 'EN' : 'KO');
       window.IRToast?.show((lang === 'KO' ? 'English' : '한국어') + '로 변경되었습니다.');
    });
  })();
</script>

<script>
(function () {
  if (location.search.indexOf('dev=1') >= 0) sessionStorage.setItem('ir-admin-ok', '1');
  if (sessionStorage.getItem('ir-admin-ok') !== '1') {
    window.location.href = '/settings/engineering';
    return;
  }

  fetch('/api/connection').then(function (r) { return r.json(); }).then(function (cfg) {
    if (!cfg) return;
    if (cfg.deviceIp) document.getElementById('dev-ip').value = cfg.deviceIp;
    if (cfg.cloud) {
      document.getElementById('cl-store').value = cfg.cloud.store || '';
      document.getElementById('cl-device').value = cfg.cloud.device || '';
      document.getElementById('cl-role').value = cfg.cloud.role || 'admin';
      document.getElementById('cl-user').value = cfg.cloud.username || '';
    }
  });

  document.getElementById('dev-connect').addEventListener('click', function () {
    var s = document.getElementById('dev-status');
    s.textContent = '연결 중…';
    fetch('/api/connection/test', { method: 'POST' })
      .then(function (r) { return r.json(); })
      .then(function (j) { s.textContent = j.ok ? '연결 성공 (' + j.latencyMs + 'ms)' : '연결 실패'; });
  });

  document.getElementById('cl-auth').addEventListener('click', function () {
    var s = document.getElementById('cl-status');
    s.textContent = '인증 중…';
    setTimeout(function () { s.textContent = '인증 성공'; }, 600);
  });

  // Save → confirm before applying
  document.querySelector('[data-ir-save]').addEventListener('click', function () {
    window.IRModal.confirm({
      body: '장치 연결 설정을 변경 합니다.',
      onOk: function () {
        var payload = {
          deviceIp: document.getElementById('dev-ip').value,
          cloud: {
            store:    document.getElementById('cl-store').value,
            device:   document.getElementById('cl-device').value,
            role:     document.getElementById('cl-role').value,
            username: document.getElementById('cl-user').value
          }
        };
        fetch('/api/connection', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        }).then(function () {
          window.IRModal.info({ body: '저장 완료', bodyClass: 'is-info' });
        });
      }
    });
  });
})();
</script>

  <!--
  iRHEA-Light — 표준 알림 모달 컨테이너 + 8 사전정의 알림.
  공통 트리거: window.IRModal.open(id) / window.IRModal.confirm({...})
  표준 ID:
    alert-password-error
    alert-extract-press
    alert-shutdown
    alert-shutdown-done
    confirm-firmware
    confirm-connection-change
    confirm-connection-fail
    confirm-irreversible
  ad-hoc 모달은 confirm({title, body, ok, cancel, onOk, onCancel}) 사용.
-->

<div class="ir-modal-overlay" id="ir-modal-overlay" data-modal-root>
  <div class="ir-modal" id="ir-modal" role="dialog" aria-modal="true" aria-labelledby="ir-modal-title">
    <div class="ir-modal-header" id="ir-modal-title">알림</div>
    <div class="ir-modal-body" id="ir-modal-body">메시지</div>
    <div class="ir-modal-actions" id="ir-modal-actions"></div>
  </div>
</div>

<script>
(function () {
  // Standard preset alerts — name, body, buttons[], optional class
  var PRESETS = {
    'alert-password-error':     { body: '암호 오류',                                       bodyClass: 'is-error', buttons: [{ label: 'X' }] },
    'alert-extract-press':      { body: '추출 진행<br>추출구의 버튼을 눌러주세요',         buttons: [{ label: 'X' }] },
    'alert-shutdown':           { body: '장비를 종료합니다.<br>기다려 주세요',             buttons: [] },
    'alert-shutdown-done':      { body: '장비 종료 완료<br>전원 스위치를 꺼주세요.',        buttons: [{ label: '확인', primary: true }] },
    'confirm-firmware':         { body: '펌웨어를 업그레이드 합니다.',                      buttons: [{ label: 'O', primary: true, value: 'ok' }, { label: 'X', value: 'cancel' }] },
    'confirm-connection-change':{ body: '장치 연결 설정을 변경 합니다.',                    buttons: [{ label: 'O', primary: true, value: 'ok' }, { label: 'X', value: 'cancel' }] },
    'confirm-connection-fail':  { body: '연결 실패<br>재시도?',                              bodyClass: 'is-error', buttons: [{ label: 'O', primary: true, value: 'ok' }, { label: 'X', value: 'cancel' }] },
    'confirm-irreversible':     { body: '복구불가<br>진행하시겠습니까?',                    bodyClass: 'is-error', buttons: [{ label: 'O', primary: true, value: 'ok' }, { label: 'X', value: 'cancel' }] }
  };

  function el(id) { return document.getElementById(id); }

  function renderActions(buttons, onClick) {
    var actions = el('ir-modal-actions');
    actions.innerHTML = '';
    buttons.forEach(function (b) {
      var btn = document.createElement('button');
      btn.className = 'ir-modal-btn' + (b.primary ? ' is-primary' : '');
      btn.textContent = b.label;
      btn.dataset.value = b.value || b.label;
      btn.addEventListener('click', function () { onClick(b.value || b.label); });
      actions.appendChild(btn);
    });
  }

  function openWith(opts) {
    var overlay = el('ir-modal-overlay');
    el('ir-modal-title').textContent = opts.title || '알림';
    var body = el('ir-modal-body');
    body.innerHTML = opts.body || '';
    body.className = 'ir-modal-body' + (opts.bodyClass ? ' ' + opts.bodyClass : '');
    renderActions(opts.buttons || [{ label: '확인', primary: true }], function (val) {
      overlay.classList.remove('is-open');
      if (typeof opts.onClose === 'function') opts.onClose(val);
    });
    overlay.classList.add('is-open');
  }

  window.IRModal = {
    open: function (id, onClose) {
      var p = PRESETS[id];
      if (!p) {
        console.warn('IRModal: unknown preset', id);
        return;
      }
      openWith({
        title: p.title || '알림',
        body: p.body,
        bodyClass: p.bodyClass,
        buttons: p.buttons,
        onClose: onClose
      });
    },
    confirm: function (opts) {
      // opts: { title, body, bodyClass, ok = 'O', cancel = 'X', onOk, onCancel }
      var buttons = [
        { label: opts.ok || 'O', primary: true, value: 'ok' },
        { label: opts.cancel || 'X', value: 'cancel' }
      ];
      openWith({
        title: opts.title || '알림',
        body: opts.body || '',
        bodyClass: opts.bodyClass,
        buttons: buttons,
        onClose: function (v) {
          if (v === 'ok' && typeof opts.onOk === 'function') opts.onOk();
          if (v === 'cancel' && typeof opts.onCancel === 'function') opts.onCancel();
        }
      });
    },
    info: function (opts) {
      openWith({
        title: opts.title || '알림',
        body: opts.body || '',
        bodyClass: opts.bodyClass,
        buttons: opts.buttons || [{ label: '확인', primary: true }],
        onClose: opts.onClose
      });
    },
    close: function () {
      var overlay = el('ir-modal-overlay');
      if (overlay) overlay.classList.remove('is-open');
    }
  };

  // Close on overlay click (only when click target is overlay itself)
  document.addEventListener('click', function (ev) {
    var overlay = el('ir-modal-overlay');
    if (!overlay || !overlay.classList.contains('is-open')) return;
    if (ev.target === overlay) {
      // Don't auto-close if there are no buttons (forced wait modal)
      var hasButtons = el('ir-modal-actions').children.length > 0;
      if (hasButtons) overlay.classList.remove('is-open');
    }
  });
})();
</script>

  <div class="ir-toast-container" id="ir-toast-container"></div>

<style>
  .ir-toast-container {
    position: fixed;
    left: 50%;
    bottom: 96px;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
    pointer-events: none;
    z-index: 1100;
  }
  .ir-toast {
    pointer-events: auto;
    background: var(--ink, #111);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    padding: 12px 18px;
    border-radius: 4px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 160ms, transform 160ms;
    max-width: 480px;
    letter-spacing: 0.01em;
  }
  .ir-toast.is-show { opacity: 1; transform: translateY(0); }
  .ir-toast.is-warn { background: var(--gold, #C5A059); color: #fff; }
  .ir-toast.is-error { background: var(--brand, #E60012); color: #fff; }
</style>

<script>
(function () {
  function show(msg, opts) {
    opts = opts || {};
    var container = document.getElementById('ir-toast-container');
    if (!container) return;
    var t = document.createElement('div');
    t.className = 'ir-toast' + (opts.type ? ' is-' + opts.type : '');
    t.textContent = msg;
    container.appendChild(t);
    requestAnimationFrame(function () { t.classList.add('is-show'); });
    setTimeout(function () {
      t.classList.remove('is-show');
      setTimeout(function () { t.remove(); }, 220);
    }, opts.duration || 2200);
  }
  window.IRToast = { show: show };
})();
</script>


  <!-- Shared fitscreen script for 1280x800 target -->
  <script>
    (function() {
      const W = 1280, H = 800;
      function fit() {
        const sw = window.innerWidth / W;
        const sh = window.innerHeight / H;
        const s = Math.min(sw, sh);
        // Only scale down if viewport is smaller, or scale to fit
        document.body.style.transform = 'scale(' + s + ')';
        document.body.style.transformOrigin = 'center center';
      }
      window.addEventListener('resize', fit);
      fit();
    })();
  </script>
