<?xml version="1.0" encoding="UTF-8"?>
<!-- iRHEA-Light PWA 앱 아이콘 — Cinema Gold (cream paper + gold initial)
     정사각 512×512 viewBox, 어떤 사이즈로 스케일해도 선명. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 배경: Cinema Gold cream paper (#FDFCFA) — 둥근 사각 (iOS/Android 마스킹 안전 영역 고려) -->
  <rect width="512" height="512" rx="88" ry="88" fill="#FDFCFA"/>

  <!-- 좌측 골드 스트라이프 (페이지 카드 시스템과 동일 모티프) -->
  <rect x="0" y="0" width="20" height="512" fill="#C5A059"/>

  <!-- 메인 마크: "iR" — Playfair italic 느낌 (시스템 fallback 시 Georgia italic) -->
  <text x="256" y="320"
        font-family="'Playfair Display', Georgia, serif"
        font-style="italic"
        font-weight="500"
        font-size="280"
        text-anchor="middle"
        fill="#1A1A1A"
        letter-spacing="-8">iR</text>

  <!-- 하단 미니 골드 도트 (active station 인디케이터 모티프) -->
  <circle cx="256" cy="400" r="6" fill="#C5A059"/>

  <!-- 하단 라벨 "LIGHT" — 마이크로 타이포 (작은 사이즈에선 거의 안 보이고, 큰 사이즈에선 디테일) -->
  <text x="256" y="440"
        font-family="'Inter', -apple-system, sans-serif"
        font-weight="600"
        font-size="22"
        text-anchor="middle"
        fill="#6A5B48"
        letter-spacing="8">LIGHT</text>
</svg>
