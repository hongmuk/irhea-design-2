name: Deploy docs/ to GitHub Pages (gh-pages branch)

# actions/configure-pages, actions/upload-pages-artifact, actions/deploy-pages
# 모두 codeload.github.com CDN 장애로 다운로드 실패함. 우회: 직접 git push
# 로 docs/ 내용을 gh-pages 브랜치에 미러링하고 Pages 가 거기서 서빙.
# actions/checkout 만 동작하면 됨 (이건 받아짐 확인).

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy docs/ → gh-pages branch
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          set -e
          # docs/ 만 별도 work dir 로 분리
          WORK=$(mktemp -d)
          cp -a docs/. "$WORK"/
          cd "$WORK"
          git init -q
          git checkout -q -b gh-pages
          git add -A
          git commit -q -m "deploy: $GITHUB_SHA"
          git push -q --force \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            gh-pages
