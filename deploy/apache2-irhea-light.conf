# Apache2 VirtualHost — iRHEA-Light Web UI on STM32MP1
# Serves the static EJS-built site at the document root.

<VirtualHost *:80>
    ServerName irhea-light.local
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        # Pretty URLs: /recipes, /brewing, /alarms etc. were built as
        # /recipes/index.html, /brewing/index.html ...
        # Apache's DirectoryIndex already handles trailing-slash directories,
        # but some clients hit /recipes (no slash). Try directory variant first,
        # then 404.html as final fallback so the SPA-style nav still resolves.
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_FILENAME}/index.html -f
        RewriteRule ^(.*)$ /$1/index.html [L]

        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ /404.html [L]
    </Directory>

    DirectoryIndex index.html

    # Compression — important on embedded link
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html
        AddOutputFilterByType DEFLATE text/css
        AddOutputFilterByType DEFLATE text/javascript
        AddOutputFilterByType DEFLATE application/javascript
        AddOutputFilterByType DEFLATE application/json
        AddOutputFilterByType DEFLATE application/xml
        AddOutputFilterByType DEFLATE image/svg+xml
    </IfModule>

    # Browser caching for static assets
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType image/jpg          "access plus 1 year"
        ExpiresByType image/jpeg         "access plus 1 year"
        ExpiresByType image/png          "access plus 1 year"
        ExpiresByType image/svg+xml      "access plus 1 year"
        ExpiresByType image/webp         "access plus 1 year"
        ExpiresByType font/woff2         "access plus 1 year"
        ExpiresByType text/css           "access plus 1 month"
        ExpiresByType application/javascript "access plus 1 month"
        # Mock JSON API: short cache so data updates surface quickly during demo
        ExpiresByType application/json   "access plus 5 minutes"
        ExpiresByType text/html          "access plus 1 hour"
    </IfModule>

    <IfModule mod_headers.c>
        Header set X-Content-Type-Options "nosniff"
        Header set X-Frame-Options        "SAMEORIGIN"
        Header set X-XSS-Protection       "1; mode=block"
    </IfModule>

    ErrorLog  ${APACHE_LOG_DIR}/irhea-light-error.log
    CustomLog ${APACHE_LOG_DIR}/irhea-light-access.log combined
</VirtualHost>
